name: Release
run-name: Release ${{ github.ref_name }}
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  call-test-workflow:
    name: Run Tests
    uses: ./.github/workflows/check.yml

  generate-changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: .github/cliff.toml
          args: --latest --strip header
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}

  build:
    needs: call-test-workflow
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            platform: windows-x86_64
            target: x86_64-pc-windows-msvc
            args: ""
          # Windows ARM64
          - os: windows-latest
            platform: windows-aarch64
            target: aarch64-pc-windows-msvc
            args: "--target aarch64-pc-windows-msvc"
          # macOS Intel
          - os: macos-15-intel
            platform: macos-x86_64
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          # macOS Apple Silicon
          - os: macos-latest
            platform: macos-aarch64
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          # Linux x64
          - os: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
            args: ""

    runs-on: ${{ matrix.os }}
    name: Release (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Linux Desktop)
        if: matrix.platform == 'linux-x86_64'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev rpm

      # ===== Common setup =====
      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: calculator_ui/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}, wasm32-unknown-unknown

      - name: Setup WASM
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen,wasm-pack

      - uses: Swatinem/rust-cache@v2

      - name: Sync Version from Tag
        if: github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          FULL_VERSION=${GITHUB_REF#refs/tags/v}
          VERSION=${FULL_VERSION%%-*}

          cd calculator_ui
          pnpm version $VERSION --no-git-tag-version --allow-same-version
          cd ..

          TAURI_CONF="calculator_ui/src-tauri/tauri.conf.json"
          tmp=$(mktemp)
          sed 's/\(\s*"version":\s*\)"[^"]*"/\1"'"$VERSION"'"/' "$TAURI_CONF" > "$tmp" && mv "$tmp" "$TAURI_CONF"

          sed "s/^version = .*/version = \"$VERSION\"/" "Cargo.toml" > "Cargo.toml.tmp" && mv "Cargo.toml.tmp" "Cargo.toml"

      - name: Update Lockfile
        if: matrix.platform == 'linux-x86_64' && github.event_name != 'workflow_dispatch'
        run: cargo check

      - name: Commit and Push Version Changes
        if: matrix.platform == 'linux-x86_64' && github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          VERSION=${VERSION%%-*}

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git diff --staged --quiet || git commit -m "chore: Bump version to $VERSION"
          git push origin HEAD:main

      # ===== Build =====
      - name: Build WASM
        working-directory: calculator_wasm
        run: wasm-pack build --release

      - name: Install Frontend Dependencies
        working-directory: calculator_ui
        run: pnpm install

      - name: Build Desktop
        working-directory: calculator_ui
        run: pnpm tauri build ${{ matrix.args }}

      - name: Build Web
        if: matrix.platform == 'linux-x86_64'
        working-directory: calculator_ui
        run: pnpm build

      # ===== Prepare and upload assets =====
      - name: Prepare Desktop Assets
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          TARGET: ${{ matrix.target }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          VERSION=${VERSION%%-*}
          BASE_NAME="Internal Force Calculator_${VERSION}_${PLATFORM}"
          mkdir -p upload_dist

          if [[ "${{ matrix.args }}" == *"--target"* ]]; then
             BASE_DIR="target/$TARGET/release"
          else
             BASE_DIR="target/release"
          fi

          # Windows
          if [[ "$PLATFORM" == windows* ]]; then
            NSIS_FILE=$(find "$BASE_DIR/bundle/nsis" -name "*.exe" -type f 2>/dev/null | head -n 1)
            if [ -n "$NSIS_FILE" ]; then
              cp "$NSIS_FILE" "upload_dist/${BASE_NAME}_setup.exe"
            fi
            MSI_FILE=$(find "$BASE_DIR/bundle/msi" -name "*.msi" -type f 2>/dev/null | head -n 1)
            if [ -n "$MSI_FILE" ]; then
              cp "$MSI_FILE" "upload_dist/${BASE_NAME}_setup.msi"
            fi
            PORTABLE="$BASE_DIR/calculator_ui.exe"
            if [ -f "$PORTABLE" ]; then
              cp "$PORTABLE" "upload_dist/${BASE_NAME}_portable.exe"
            fi
          fi

          # Linux
          if [[ "$PLATFORM" == linux* ]]; then
            APPIMAGE=$(find "$BASE_DIR/bundle/appimage" -name "*.AppImage" -type f 2>/dev/null | head -n 1)
            if [ -n "$APPIMAGE" ]; then
              cp "$APPIMAGE" "upload_dist/${BASE_NAME}.AppImage"
            fi
            DEB=$(find "$BASE_DIR/bundle/deb" -name "*.deb" -type f 2>/dev/null | head -n 1)
            if [ -n "$DEB" ]; then
              cp "$DEB" "upload_dist/${BASE_NAME}.deb"
            fi
            RPM=$(find "$BASE_DIR/bundle/rpm" -name "*.rpm" -type f 2>/dev/null | head -n 1)
            if [ -n "$RPM" ]; then
              cp "$RPM" "upload_dist/${BASE_NAME}.rpm"
            fi
          fi

          # macOS
          if [[ "$PLATFORM" == macos* ]]; then
            DMG=$(find "$BASE_DIR/bundle/dmg" -name "*.dmg" -type f 2>/dev/null | head -n 1)
            if [ -n "$DMG" ]; then
              cp "$DMG" "upload_dist/${BASE_NAME}.dmg"
            fi
          fi

          # web
          if [[ "$PLATFORM" == linux-x86_64 ]]; then
            tar -cf upload_dist/web.tar.zst -C calculator_ui/dist .
          fi

      - name: Upload Desktop Assets
        uses: actions/upload-artifact@v7
        with:
          name: assets-${{ matrix.platform }}
          path: upload_dist/
          if-no-files-found: error

  release:
    if: github.event_name != 'workflow_dispatch'
    needs: [ build, generate-changelog ]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: assets-*
          merge-multiple: true
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          body: ${{ needs.generate-changelog.outputs.release_body }}
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          files: release-assets/**
