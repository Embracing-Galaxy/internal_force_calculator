name: Release
run-name: Release ${{ github.ref_name }}
on:
  push:
    tags:
      - 'v*'

jobs:
  call-test-workflow:
    name: Run Tests
    uses: ./.github/workflows/check.yml

  publish:
    needs: call-test-workflow
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            platform: windows-x86_64
            target: x86_64-pc-windows-msvc
            args: ""
          # Windows ARM64
          - os: windows-latest
            platform: windows-aarch64
            target: aarch64-pc-windows-msvc
            args: "--target aarch64-pc-windows-msvc"
          # macOS Intel
          - os: macos-15-intel
            platform: macos-x86_64
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          # macOS Apple Silicon
          - os: macos-latest
            platform: macos-aarch64
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          # Linux x64
          - os: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
            args: ""

    runs-on: ${{ matrix.os }}
    name: Release (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Linux Desktop)
        if: matrix.platform == 'linux-x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev rpm

      # ===== Common setup =====
      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: calculator_ui/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}, wasm32-unknown-unknown

      - name: Setup WASM
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen,wasm-pack

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            calculator_ui/src-tauri

      - name: Sync Version from Tag
        shell: bash
        run: |
          FULL_VERSION=${GITHUB_REF#refs/tags/v}
          VERSION=${FULL_VERSION%%-*}

          cd calculator_ui
          pnpm version $VERSION --no-git-tag-version --allow-same-version
          cd ..

          TAURI_CONF="calculator_ui/src-tauri/tauri.conf.json"
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' "$TAURI_CONF" > "$tmp" && mv "$tmp" "$TAURI_CONF"

          sed "s/^version = .*/version = \"$VERSION\"/" "Cargo.toml" > "Cargo.toml.tmp" && mv "Cargo.toml.tmp" "Cargo.toml"

      - name: Update Lockfile
        if: matrix.platform == 'linux-x86_64'
        run: cargo check

      - name: Commit and Push Version Changes
        if: matrix.platform == 'linux-x86_64'
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          VERSION=${VERSION%%-*}
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git diff --staged --quiet || git commit -m "chore: Bump version to $VERSION"
          git push origin HEAD:main

      # ===== Build =====
      - name: Build WASM
        working-directory: calculator_wasm
        run: wasm-pack build --release

      - name: Install Frontend Dependencies
        working-directory: calculator_ui
        run: pnpm install

      - name: Build Desktop
        working-directory: calculator_ui
        run: pnpm tauri build ${{ matrix.args }}

      - name: Build Web
        if: matrix.platform == 'linux-x86_64'
        working-directory: calculator_ui
        run: pnpm build

      # ===== Release body generation (only on linux-x86_64) =====
      - name: Generate Release Body with git-cliff
        if: matrix.platform == 'linux-x86_64'
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          args: --latest --strip header
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}

      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body: ${{ steps.git-cliff.outputs.content }}
          draft: true
          prerelease: ${{ contains(github.ref_name, 'beta') }}

      # ===== Upload assets =====
      - name: Upload Desktop Assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          PLATFORM: ${{ matrix.platform }}
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p upload_dist

          if [[ "${{ matrix.args }}" == *"--target"* ]]; then
             BASE_DIR="target/$TARGET/release"
          else
             BASE_DIR="target/release"
          fi
          
          echo "Base Directory: $BASE_DIR"

          echo "=== Bundle Directory Contents ==="
          if [ -d "$BASE_DIR/bundle" ]; then
            ls -laR "$BASE_DIR/bundle" || true
          else
            echo "ERROR: Bundle directory does not exist: $BASE_DIR/bundle"
            ls -la "$BASE_DIR" || true
            exit 1
          fi
          echo "================================="

          # Windows
          if [[ "$PLATFORM" == windows* ]]; then
            echo "Looking for Windows assets..."
            NSIS_FILE=$(find "$BASE_DIR/bundle/nsis" -name "*.exe" -type f 2>/dev/null | head -n 1)
            if [ -n "$NSIS_FILE" ]; then
              echo "Found NSIS: $NSIS_FILE"
              cp "$NSIS_FILE" "upload_dist/$NSIS_FILE"
            fi

            MSI_FILE=$(find "$BASE_DIR/bundle/msi" -name "*.exe" -type f 2>/dev/null | head -n 1)
            if [ -n "$MSI_FILE" ]; then
              echo "Found NSIS: $NSIS_FILE"
              cp "$NSIS_FILE" "upload_dist/$NSIS_FILE"
            fi

            PORTABLE="$BASE_DIR/calculator_ui.exe"
            if [ -f "$PORTABLE" ]; then
              cp "$PORTABLE" "upload_dist/$PORTABLE"
            fi
          fi

          # Linux
          if [[ "$PLATFORM" == linux* ]]; then
            echo "Looking for Linux assets..."
            APPIMAGE=$(find "$BASE_DIR/bundle/appimage" -name "*.AppImage" -type f 2>/dev/null | head -n 1)
            if [ -n "$APPIMAGE" ]; then
              cp "$APPIMAGE" "upload_dist/$APPIMAGE"
            fi

            DEB=$(find "$BASE_DIR/bundle/deb" -name "*.deb" -type f 2>/dev/null | head -n 1)
            if [ -n "$DEB" ]; then
              cp "$DEB" "upload_dist/$DEB"
            fi

            RPM=$(find "$BASE_DIR/bundle/rpm" -name "*.rpm" -type f 2>/dev/null | head -n 1)
            if [ -n "$RPM" ]; then
              cp "$RPM" "upload_dist/$RPM"
            fi
          fi

          # macOS
          if [[ "$PLATFORM" == macos* ]]; then
            echo "Looking for macOS assets..."
            DMG=$(find "$BASE_DIR/bundle/dmg" -name "*.dmg" -type f 2>/dev/null | head -n 1)
            if [ -n "$DMG" ]; then
              cp "$DMG" "upload_dist/$DMG"
            fi
          fi

          # web
          if [[ "$PLATFORM" == linux-x86_64 ]]; then
            echo "Looking for web assets..."
            tar -cf upload_dist/web.tar.zst -C calculator_ui/dist .
          fi

          echo "=== Upload Directory Contents ==="
          ls -la upload_dist/
          echo "================================="
          
          if [ "$(ls -A upload_dist 2>/dev/null)" ]; then
            gh release upload "$TAG_NAME" upload_dist/* --clobber
            echo "✅ Upload complete!"
          else
            echo "❌ ERROR: No assets found to upload for $PLATFORM"
            exit 1
          fi
