name: Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
          build-essential \
          curl \
          wget \
          file \
          libssl-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev
      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: calculator_ui/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-bindgen-cli
        shell: bash
        run: cargo install wasm-bindgen-cli

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            calculator_ui/src-tauri

      - name: Install Frontend Dependencies
        working-directory: calculator_ui
        run: pnpm install

      - name: Run cargo fmt & clippy & test
        run: |
          cargo fmt --check
          cargo clippy
          cargo test --verbose
